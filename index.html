<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Fault Reporting</title>
<style>
  :root{
    --bg:#1C1B1A; --panel:#262421; --panel-2:#332F2A;
    --text:#F5F2EA; --text-dim:#B7B0A4;
    --amber:#F2A93B; --amber-dark:#7A5417;
    --red:#C23B22; --red-dark:#5C1B10;
    --border:#403C36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{ max-width:520px; margin:0 auto; padding:20px 16px 60px; min-height:100vh; }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:22px; }
  .badge{
    width:44px; height:44px; background:var(--amber); color:#2A1D05;
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:20px; flex-shrink:0;
  }
  h1{ font-size:20px; margin:0; font-weight:700; }
  header p{ margin:2px 0 0; font-size:12.5px; color:var(--text-dim); }
  .crumbs{ display:flex; gap:6px; margin-bottom:18px; font-size:12px; color:var(--text-dim); flex-wrap:wrap; }
  .crumbs span.active{ color:var(--amber); font-weight:700; }
  .step-label{ font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-dim); margin:0 0 10px 2px; font-weight:700; }
  .btn-back{ background:none; border:none; color:var(--red); font-size:18px; font-weight:700; padding:12px 2px 18px; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .tile{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px 12px; text-align:center; cursor:pointer; color:var(--text);
    font-size:15px; font-weight:600; display:flex; flex-direction:column;
    align-items:center; gap:8px; min-height:88px; justify-content:center;
  }
  .tile .ic{ font-size:26px; }
  .store-list .tile{ grid-column:span 2; flex-direction:row; justify-content:flex-start; text-align:left; padding:14px 16px; min-height:auto; }
  .store-list{ display:flex; flex-direction:column; gap:8px; }
  .trouble-box{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:15px; }
  .trouble-box ol{ margin:0; padding-left:20px; color:var(--text); font-size:15px; line-height:1.6; }
  .trouble-box ol li{ margin-bottom:15px; }
  .trouble-box ul { margin: 5px 0 0 0; padding-left: 20px; }
  .trouble-box ul li { margin-bottom: 5px; list-style-type: disc; }
  .btn-action{ display:block; width:100%; padding:14px; background:var(--red); color:#FBEAE6; border:none; border-radius:8px; font-size:16px; font-weight:800; text-align:center; cursor:pointer; margin-top:20px; }
  .contact-card{ background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--amber-dark); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
  .contact-name{ font-size:16.5px; font-weight:700; margin:0 0 4px; }
  .contact-role{ font-size:12.5px; color:var(--text-dim); margin:0 0 12px; }
  .btn-group{ display:flex; flex-direction:column; gap:8px; }
  .call-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; background:var(--amber); color:#2A1D05; border:none; border-radius:8px; font-size:15px; font-weight:800; text-decoration:none; }
  .email-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; background:var(--panel-2); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:15px; font-weight:700; text-decoration:none; }
  .info-box{ background:var(--panel-2); padding:15px; border-radius:8px; font-size:14px; line-height:1.5; color:var(--amber); border:1px solid var(--amber-dark); }
  .empty{ text-align:center; color:var(--text-dim); font-size:14px; padding:40px 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">☎</div>
    <div>
      <h1>Store Support</h1>
      <p>Log faults and find contacts</p>
    </div>
  </header>

  <div class="crumbs" id="crumbs"></div>
  <div id="app"></div>
</div>

<script src="app.js"></script>
</body>
</html>
